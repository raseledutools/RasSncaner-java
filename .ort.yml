excludes:
  paths:
    # ── Build artifacts ──
    - pattern: "build/**"
      reason: "BUILD_TOOL_OF"
      comment: "Generated build output."

    - pattern: ".gradle/**"
      reason: "BUILD_TOOL_OF"
      comment: "Gradle working directory."

    - pattern: "**/build/**"
      reason: "BUILD_TOOL_OF"
      comment: "Module build output."

    - pattern: "ort-out/**"
      reason: "BUILD_TOOL_OF"
      comment: "ORT output directory, generated during compliance runs."

    # ── Test code ──
    - pattern: "**/src/test/**"
      reason: "TEST_OF"
      comment: "Unit tests are not shipped."

    - pattern: "**/src/androidTest/**"
      reason: "TEST_OF"
      comment: "Instrumentation tests are not shipped."

    - pattern: "app/src/main/assets/test_pdfs/**"
      reason: "TEST_OF"
      comment: "Test PDFs excluded from release APK via aaptOptions."

    - pattern: "app/src/main/assets/test_jpegs/**"
      reason: "TEST_OF"
      comment: "Test JPEGs excluded from release APK via aaptOptions."

    # ── External source trees (build inputs, not shipped as-is) ──
    - pattern: "external/opencv/**"
      reason: "BUILD_TOOL_OF"
      comment: "OpenCV full source tree used to build prebuilt .so files. The shipped native libs in app/src/main/jniLibs are covered separately."

    - pattern: "external/opencv_pinned_jni/**"
      reason: "BUILD_TOOL_OF"
      comment: "Pinned OpenCV JNI bindings used during native build."

    - pattern: "external/onnxruntime/**"
      reason: "BUILD_TOOL_OF"
      comment: "ONNX Runtime full source tree used to build prebuilt artifacts. The shipped JAR/AAR in app/libs is covered by dependency analysis."

    - pattern: "external/onnxruntime_pinned/**"
      reason: "BUILD_TOOL_OF"
      comment: "Pinned ONNX Runtime sources used during native build."

    # ── Training / ML pipeline (not shipped) ──
    - pattern: "training/**"
      reason: "OPTIONAL_COMPONENT_OF"
      comment: "ML training pipeline, not part of the shipped app."

    # ── Server module (separate component) ──
    - pattern: "server/**"
      reason: "OPTIONAL_COMPONENT_OF"
      comment: "Server module, not part of the shipped Android app."

    # ── Langpack module (separate deliverable) ──
    - pattern: "langpack-latin-best/**"
      reason: "OPTIONAL_COMPONENT_OF"
      comment: "Separate language pack module with its own licensing. Only used for instrumented test comparison."

    # ── Python virtual environment ──
    - pattern: "venv/**"
      reason: "BUILD_TOOL_OF"
      comment: "Python virtual environment for local tooling (ScanCode etc.)."

    # ── Scripts and tooling ──
    - pattern: "scripts/**"
      reason: "BUILD_TOOL_OF"
      comment: "Build and compliance helper scripts, not shipped."

    # ── Documentation and metadata ──
    - pattern: "docs/**"
      reason: "DOCUMENTATION_OF"
      comment: "Documentation is not part of the shipped app."

    - pattern: "fastlane/**"
      reason: "DOCUMENTATION_OF"
      comment: "Fastlane metadata and screenshots."

    - pattern: "metadata/**"
      reason: "DOCUMENTATION_OF"
      comment: "F-Droid / store metadata."

    - pattern: "screenshots/**"
      reason: "DOCUMENTATION_OF"
      comment: "Store and documentation screenshots."

    # ── ORT config (self-referential) ──
    - pattern: "ort/**"
      reason: "BUILD_TOOL_OF"
      comment: "ORT configuration files."

    # ── Third-party license documentation ──
    - pattern: "third_party_licenses/**"
      reason: "DOCUMENTATION_OF"
      comment: "Collected third-party license texts for documentation purposes."

    # ── Image files (review for your project) ──
    - pattern: "**/*.png"
      reason: "DATA_FILE_OF"
      comment: "Image assets. Drawable resources are shipped but not license-relevant."

    - pattern: "**/*.jpg"
      reason: "DATA_FILE_OF"
      comment: "Image files, typically not license-relevant."

    - pattern: "**/*.jpeg"
      reason: "DATA_FILE_OF"
      comment: "Image files, typically not license-relevant."

    - pattern: "**/*.webp"
      reason: "DATA_FILE_OF"
      comment: "Image files, typically not license-relevant."

    # ── Binary / large data files (not source code) ──
    - pattern: "**/*.so"
      reason: "DATA_FILE_OF"
      comment: "Prebuilt native shared libraries. License info comes from source repos, not binaries."

    - pattern: "**/*.ort"
      reason: "DATA_FILE_OF"
      comment: "ONNX Runtime model files (binary ML models)."

    - pattern: "**/*.traineddata"
      reason: "DATA_FILE_OF"
      comment: "Tesseract OCR trained data files (binary)."

    - pattern: "**/*.ttf"
      reason: "DATA_FILE_OF"
      comment: "Font files (binary)."

    - pattern: "**/*.otf"
      reason: "DATA_FILE_OF"
      comment: "Font files (binary)."

    - pattern: "**/*.gz"
      reason: "DATA_FILE_OF"
      comment: "Compressed data files (e.g. dictionary files)."

    # ── ScanCode output ──
    - pattern: "scancode_result.json"
      reason: "BUILD_TOOL_OF"
      comment: "ScanCode scan output."

    - pattern: "scancode_run.log"
      reason: "BUILD_TOOL_OF"
      comment: "ScanCode run log."
