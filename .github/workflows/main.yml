name: Build RasFocus APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r28
          add-to-path: true

      - name: Grant execute permission for scripts
        run: |
          chmod +x gradlew
          chmod +x scripts/*.sh

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-native-${{ hashFiles('**/*.gradle*') }}

      - name: Cache native build intermediates
        uses: actions/cache@v4
        with:
          path: |
            /tmp/opencv-build
            /tmp/onnxruntime-build
          key: ${{ runner.os }}-native-${{ hashFiles('external/**/.git/HEAD') }}

      - name: Build OpenCV for Android (from source)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: ./scripts/build_opencv_android.sh

      - name: Copy OpenCV native libraries into app/jniLibs
        run: ./scripts/prepare_opencv.sh

      - name: Build ONNX Runtime for Android (from source, minimal ops)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: ./scripts/build_onnxruntime_android.sh

      - name: Verify app/libs was populated
        run: |
          echo "Contents of app/libs:"
          ls -la app/libs/
          if [ -z "$(ls -A app/libs/ 2>/dev/null)" ]; then
            echo "::error::app/libs is empty — ONNX Runtime build did not produce an artifact."
            exit 1
          fi

      - name: Build Debug APK
        run: ./gradlew assemblePaddleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RasFocus-debug-apk
          path: app/build/outputs/apk/**/*.apk
          retention-days: 30
