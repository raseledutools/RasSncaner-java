name: License Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install scancode-toolkit
      - run: >
          scancode
          --license
          --copyright
          --package
          --classify
          --summary
          --timeout 120
          --processes 4
          --json-pp scancode.json
          app/src/main
      - uses: actions/upload-artifact@v4
        with:
          name: scancode-report
          path: scancode.json
