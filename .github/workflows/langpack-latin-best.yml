name: Build Release (Langpack Latin Best)

on:
  push:
    tags: [ 'langpack-latin-best-v*' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Android Build-Tools (for apksigner)
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --sdk_root=${ANDROID_HOME} "build-tools;34.0.0"
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ENCODED_KEYSTORE" ]; then
            echo "$ENCODED_KEYSTORE" | base64 --decode > langpack-latin-best/keystore.jks
            echo "Keystore decoded successfully"
          else
            echo "No keystore provided. Tag build will proceed unsigned."
          fi

      - name: Extract versionName and versionCode from langpack build.gradle
        id: extract_version
        run: |
          FILE=langpack-latin-best/build.gradle
          VERSION=$(grep -m1 'versionName' "$FILE" | sed 's/[^"]*"\([^"]*\)".*/\1/')
          VERSION_CODE=$(grep -m1 'versionCode' "$FILE" | grep -o '[0-9]\+')
          echo "VERSION=$VERSION"
          echo "VERSION_CODE=$VERSION_CODE"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT

      # Unsigned build for PRs/branches
      - name: Build (unsigned) â€“ PRs/branches
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          ./gradlew --no-daemon :langpack-latin-best:clean :langpack-latin-best:assembleRelease :langpack-latin-best:bundleRelease

      # Signed build for tags (only if secrets provided; Gradle must wire SIGNING_* props)
      - name: Build (signed) â€“ tags
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          EXTRA_PROPS=""
          if [ -n "${SIGNING_KEY_ALIAS}" ] && [ -n "${SIGNING_KEY_PASSWORD}" ] && [ -n "${SIGNING_STORE_PASSWORD}" ]; then
            EXTRA_PROPS="-PSIGNING_KEY_ALIAS=${SIGNING_KEY_ALIAS} -PSIGNING_KEY_PASSWORD=${SIGNING_KEY_PASSWORD} -PSIGNING_STORE_PASSWORD=${SIGNING_STORE_PASSWORD}"
          else
            echo "Signing secrets missing â†’ building unsigned even for tag."
          fi
          ./gradlew --no-daemon :langpack-latin-best:clean :langpack-latin-best:assembleRelease :langpack-latin-best:bundleRelease $EXTRA_PROPS

      - name: Rename artifacts
        run: |
          set -euo pipefail
          VERSION="${{ steps.extract_version.outputs.VERSION }}"
          APK_OUT="langpack-latin-best/build/outputs/apk/release"
          AAB_OUT="langpack-latin-best/build/outputs/bundle/release"

          # Determine APK source (signed or unsigned) and rename
          SRC_APK=""
          if [ -f "$APK_OUT/langpack-latin-best-release.apk" ]; then
            SRC_APK="$APK_OUT/langpack-latin-best-release.apk"
          elif [ -f "$APK_OUT/langpack-latin-best-release-unsigned.apk" ]; then
            SRC_APK="$APK_OUT/langpack-latin-best-release-unsigned.apk"
          fi
          if [ -n "$SRC_APK" ]; then
            mv "$SRC_APK" "$APK_OUT/MakeACopy-Langpack-Latin-Best-v${VERSION}-release.apk"
          else
            echo "No release APK found to rename."
          fi

          # Rename AAB if present
          if [ -f "$AAB_OUT/langpack-latin-best-release.aab" ]; then
            mv "$AAB_OUT/langpack-latin-best-release.aab" "$AAB_OUT/MakeACopy-Langpack-Latin-Best-v${VERSION}-release.aab"
          fi

      - name: Verify APK signatures (tags only, only if signed)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          VERSION="${{ steps.extract_version.outputs.VERSION }}"
          APK_OUT="langpack-latin-best/build/outputs/apk/release"
          TARGET="$APK_OUT/MakeACopy-Langpack-Latin-Best-v${VERSION}-release.apk"

          [ -f "$TARGET" ] || { echo "No APK to verify."; exit 0; }

          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -Vr | head -n1 || true)
          if [ -z "$APKSIGNER" ]; then
            echo "apksigner not found â†’ skipping verification."
            exit 0
          fi

          # If not signed, apksigner verify returns non-zero
          if ! "$APKSIGNER" verify --verbose "$TARGET"; then
            echo "APK is not signed or verification failed."
            exit 1
          fi

      - name: Generate checksums
        run: |
          set -euo pipefail
          VERSION="${{ steps.extract_version.outputs.VERSION }}"
          APK_OUT="langpack-latin-best/build/outputs/apk/release"
          AAB_OUT="langpack-latin-best/build/outputs/bundle/release"
          if command -v sha256sum >/dev/null 2>&1; then H=sha256sum; else H="shasum -a 256"; fi
          [ -f "$APK_OUT/MakeACopy-Langpack-Latin-Best-v${VERSION}-release.apk" ] && $H "$APK_OUT/MakeACopy-Langpack-Latin-Best-v${VERSION}-release.apk" > "$APK_OUT/MakeACopy-Langpack-Latin-Best-v${VERSION}-release.apk.sha256"
          [ -f "$AAB_OUT/MakeACopy-Langpack-Latin-Best-v${VERSION}-release.aab" ] && $H "$AAB_OUT/MakeACopy-Langpack-Latin-Best-v${VERSION}-release.aab" > "$AAB_OUT/MakeACopy-Langpack-Latin-Best-v${VERSION}-release.aab.sha256"

      - name: Load Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        id: release_notes
        run: |
          VERSION_CODE=${{ steps.extract_version.outputs.VERSION_CODE }}
          FILE="langpack-latin-best/fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt"
          echo "Using changelog: $FILE"
          if [ -f "$FILE" ]; then
            NOTES=$(cat "$FILE")
          else
            NOTES="MakeACopy OCR Latin (Best)\n- Initial release: best-quality models for DE/EN/ES/FR/IT."
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          name: "MakeACopy OCR Latin (Best) v${{ steps.extract_version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.notes }}
          files: |
            langpack-latin-best/build/outputs/apk/release/MakeACopy-Langpack-Latin-Best-v${{ steps.extract_version.outputs.VERSION }}-release.apk
            langpack-latin-best/build/outputs/apk/release/MakeACopy-Langpack-Latin-Best-v${{ steps.extract_version.outputs.VERSION }}-release.apk.sha256
            langpack-latin-best/build/outputs/bundle/release/MakeACopy-Langpack-Latin-Best-v${{ steps.extract_version.outputs.VERSION }}-release.aab
            langpack-latin-best/build/outputs/bundle/release/MakeACopy-Langpack-Latin-Best-v${{ steps.extract_version.outputs.VERSION }}-release.aab.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MakeACopy-Langpack-Latin-Best-${{ steps.extract_version.outputs.VERSION }}
          path: |
            langpack-latin-best/build/outputs/apk/release/*.apk
            langpack-latin-best/build/outputs/apk/release/*.sha256
            langpack-latin-best/build/outputs/bundle/release/*.aab
            langpack-latin-best/build/outputs/bundle/release/*.sha256
