ort:
  analyzer:
    skipExcluded: true
    disabledPackageManagers:
      - SBT
      - CocoaPods
      - PIP
      - NuGet
      - Bazel
  scanner:
    skipExcluded: true
    config:
      ScanCode:
        options:
          commandLine: "--copyright, --license, --info, --strip-root, --timeout, 60"
          commandLineNonConfig: "--processes, 4, --verbose"
    ignorePatterns:
      # ORT defaults (must be re-listed when overriding)
      - "**/*.ort.yml"
      - "**/*.spdx.yml"
      - "**/*.spdx.yaml"
      - "**/*.spdx.json"
      - "**/META-INF/DEPENDENCIES"
      - "**/META-INF/DEPENDENCIES.txt"
      - "**/META-INF/NOTICE"
      - "**/META-INF/NOTICE.txt"
      # Submodule directories — prevent ORT from cloning large external repos
      # (onnxruntime ~708MB+, opencv ~211MB) during nested provenance resolution
      - "external/onnxruntime/**"
      - "external/opencv/**"
      # Binary files — not source code, scanning wastes time
      - "**/*.so"
      - "**/*.ort"
      - "**/*.traineddata"
      - "**/*.ttf"
      - "**/*.otf"
      - "**/*.gz"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.webp"
      - "**/*.pdf"
      - "**/*.jar"
      - "**/*.aar"
      - "**/*.dex"
      - "**/*.apk"
  packageConfigurationProviders:
    - type: Dir
      options:
        path: ort/config/package-configurations
        mustExist: false
